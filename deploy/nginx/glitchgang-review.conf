server {
    listen 80;
    server_name glitchgang.net www.glitchgang.net;
    return 301 https://glitchgang.net$request_uri;
}

server {
    listen 80;
    server_name api.glitchgang.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.glitchgang.net;

    ssl_certificate /etc/letsencrypt/live/glitchgang.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glitchgang.net/privkey.pem;

    return 301 https://glitchgang.net$request_uri;
}

server {
    listen 443 ssl http2;
    server_name glitchgang.net;

    ssl_certificate /etc/letsencrypt/live/glitchgang.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glitchgang.net/privkey.pem;

    root /var/www/glitchgang/frontend/dist;
    index index.html;

    # Mientras uses dev key para review privada, protege el sitio.
    # auth_basic "GlitchGang Riot Review";
    # auth_basic_user_file /etc/nginx/.htpasswd-glitchgang-review;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}

server {
    listen 443 ssl http2;
    server_name api.glitchgang.net;

    ssl_certificate /etc/letsencrypt/live/api.glitchgang.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.glitchgang.net/privkey.pem;

    client_max_body_size 20M;

    # Mantén la API cerrada mientras uses dev key en review privada.
    # auth_basic "GlitchGang Riot Review API";
    # auth_basic_user_file /etc/nginx/.htpasswd-glitchgang-review;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
